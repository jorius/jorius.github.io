<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="geometricPrecision">
  <!-- Dark square so the mark reads the same on light/dark browser chrome -->
  <rect width="32" height="32" fill="#292929"/>
  <!-- Cat head: two triangular ears feeding into a rounded face -->
  <path d="M4 13 L7 3 L11 13 L21 13 L25 3 L28 13 L28 24 Q28 28 24 28 L8 28 Q4 28 4 24 Z" fill="#f2efe7"/>
  <!-- Inner ears (warm pink for personality) -->
  <path d="M7 6 L8.5 11 L9.5 8 Z" fill="#ff7ab0"/>
  <path d="M22.5 8 L23.5 11 L25 6 Z" fill="#ff7ab0"/>
  <!-- Eyes: dark pupils with a small highlight for "alive" look -->
  <circle cx="12" cy="18" r="2" fill="#292929"/>
  <circle cx="20" cy="18" r="2" fill="#292929"/>
  <circle cx="12.5" cy="17.4" r="0.55" fill="#f2efe7"/>
  <circle cx="20.5" cy="17.4" r="0.55" fill="#f2efe7"/>
  <!-- Pink nose -->
  <path d="M16 22 L14.4 23.4 L17.6 23.4 Z" fill="#ff7ab0"/>
  <!-- Tiny smile -->
  <path d="M14 24.2 Q16 25.6 18 24.2" stroke="#292929" stroke-width="0.7" fill="none" stroke-linecap="round"/>
</svg>
